<ion-content class="splash-content">

  <div class="splash-container" [class.visible]="animando">

    <div class="splash-logo">
      <ion-icon name="restaurant"></ion-icon>
    </div>

    <div class="splash-texto">
      <h1 class="splash-title">Restaurante</h1>
      <h1 class="splash-title accent">Bambino</h1>
      <p class="splash-sub">La mejor comida de la ciudad</p>
    </div>

    <div class="splash-dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

  </div>

</ion-content>
