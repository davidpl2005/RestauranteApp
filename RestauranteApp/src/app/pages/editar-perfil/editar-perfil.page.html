<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button
        defaultHref="/tabs/perfil"
        text="Perfil"
        color="light">
      </ion-back-button>
    </ion-buttons>
    <ion-title>Editar Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="editar-content">

  <div *ngIf="form" class="editar-wrapper">

    <!-- Avatar -->
    <div class="editar-hero">
      <div class="avatar-circulo">
        <span>
          {{ form.get('nombre')?.value
              ? form.get('nombre')?.value[0]?.toUpperCase()
              : '?' }}
        </span>
      </div>
      <p class="avatar-hint">Edita tu nombre y correo</p>
    </div>

    <!-- Formulario -->
    <div class="app-card-lg form-card">

      <form [formGroup]="form">

        <!-- Nombre -->
        <div class="input-group">
          <label class="input-label">Nombre completo</label>
          <ion-item class="input-field" lines="none">
            <ion-icon name="person-outline" slot="start"></ion-icon>
            <ion-input
              formControlName="nombre"
              type="text"
              placeholder="Tu nombre completo"
              autocomplete="name">
            </ion-input>
          </ion-item>
          <div class="input-error"
            *ngIf="form.get('nombre')?.invalid && form.get('nombre')?.touched">
            <ion-icon name="alert-circle-outline"></ion-icon>
            Mínimo 3 caracteres
          </div>
        </div>

        <!-- Correo -->
        <div class="input-group" style="margin-bottom: 0;">
          <label class="input-label">Correo electrónico</label>
          <ion-item class="input-field" lines="none">
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <ion-input
              formControlName="correo"
              type="email"
              placeholder="tu@correo.com"
              autocomplete="email">
            </ion-input>
          </ion-item>
          <div class="input-error"
            *ngIf="form.get('correo')?.invalid && form.get('correo')?.touched">
            <ion-icon name="alert-circle-outline"></ion-icon>
            Ingresa un correo válido
          </div>
        </div>

      </form>

    </div>

    <!-- Aviso -->
    <div class="aviso-card">
      <ion-icon name="shield-checkmark-outline"></ion-icon>
      <p>Tus datos se actualizarán de forma segura.</p>
    </div>

    <!-- Botón guardar -->
    <div class="btn-container">
      <ion-button
        expand="block"
        class="btn-primary"
        (click)="guardar()"
        [disabled]="form.invalid || !hayCambios()">
        <ion-icon name="save-outline" slot="start"></ion-icon>
        Guardar Cambios
      </ion-button>
    </div>

  </div>

</ion-content>
