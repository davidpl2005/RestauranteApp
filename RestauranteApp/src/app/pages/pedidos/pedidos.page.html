<ion-header>
  <ion-toolbar color="primary">
    <ion-title>
      <div class="toolbar-title">
        <ion-icon name="receipt-outline"></ion-icon>
        <span>Mis Pedidos</span>
      </div>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content refreshingSpinner="crescent"></ion-refresher-content>
  </ion-refresher>

  <!-- Loading -->
  <div *ngIf="cargando" class="loading-container">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
    <p>Cargando pedidos...</p>
  </div>

  <!-- Sin pedidos -->
  <div *ngIf="!cargando && pedidos.length === 0" class="empty-state">
    <ion-icon name="receipt-outline" class="empty-icon"></ion-icon>
    <p class="empty-title">Sin pedidos aún</p>
    <p class="empty-text">Cuando realices un pedido aparecerá aquí</p>
    <ion-button routerLink="/tabs/menu" class="btn-primary">
      <ion-icon name="restaurant-outline" slot="start"></ion-icon>
      Ver Menú
    </ion-button>
  </div>

  <!-- Lista -->
  <div class="pedidos-lista" *ngIf="!cargando && pedidos.length > 0">

    <div
      *ngFor="let pedido of pedidos"
      class="pedido-card"
      (click)="verDetalle(pedido.id_pedido)">

      <!-- Encabezado -->
      <div class="pedido-head">
        <div class="pedido-num-wrap">
          <span class="pedido-num">Pedido #{{ pedido.id_pedido }}</span>
          <span class="pedido-fecha">
            {{ pedido.fecha_pedido | date:'dd/MM/yyyy · HH:mm' }}
          </span>
        </div>
        <div
          class="estado-badge"
          [style.background]="getEstado(pedido.estado).bg"
          [style.color]="getEstado(pedido.estado).color">
          <ion-icon [name]="getEstado(pedido.estado).icono"></ion-icon>
          {{ getEstado(pedido.estado).texto }}
        </div>
      </div>

      <div class="app-divider" style="margin: 10px 0;"></div>

      <!-- Pie -->
      <div class="pedido-foot">
        <span class="pedido-total">${{ pedido.total | number:'1.2-2' }}</span>
        <span class="pedido-ver">
          Ver detalle
          <ion-icon name="chevron-forward-outline"></ion-icon>
        </span>
      </div>

    </div>

  </div>

</ion-content>
