<ion-content class="login-content">

  <div class="login-wrapper">

    <!-- Hero superior -->
    <div class="login-hero">
      <div class="hero-logo">
        <ion-icon name="restaurant"></ion-icon>
      </div>
      <h1 class="hero-title">Restaurante Bambino</h1>
      <p class="hero-subtitle">La mejor comida de la ciudad</p>
    </div>

    <!-- Tarjeta del formulario -->
    <div class="login-card">

      <h2 class="card-title">Iniciar Sesión</h2>
      <p class="card-subtitle">Ingresa tus credenciales para continuar</p>

      <form [formGroup]="form" (ngSubmit)="login()">

        <!-- Correo -->
        <div class="input-group">
          <label class="input-label">Correo electrónico</label>
          <ion-item class="input-field" lines="none">
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <ion-input
              formControlName="correo"
              type="email"
              placeholder="tu@correo.com"
              autocomplete="email">
            </ion-input>
          </ion-item>
          <div class="input-error"
            *ngIf="form.get('correo')?.invalid && form.get('correo')?.touched">
            <ion-icon name="alert-circle-outline"></ion-icon>
            Ingresa un correo válido
          </div>
        </div>

        <!-- Password -->
        <div class="input-group">
          <label class="input-label">Contraseña</label>
          <ion-item class="input-field" lines="none">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input
              formControlName="password"
              [type]="mostrarPassword ? 'text' : 'password'"
              placeholder="Tu contraseña">
            </ion-input>
            <ion-icon
              [name]="mostrarPassword ? 'eye-off-outline' : 'eye-outline'"
              slot="end"
              (click)="togglePassword()">
            </ion-icon>
          </ion-item>
          <div class="input-error"
            *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
            <ion-icon name="alert-circle-outline"></ion-icon>
            Mínimo 3 caracteres
          </div>
        </div>

        <!-- Botón login -->
        <ion-button
          expand="block"
          class="btn-primary btn-login"
          type="submit"
          [disabled]="form.invalid">
          <ion-icon name="log-in-outline" slot="start"></ion-icon>
          Iniciar Sesión
        </ion-button>

      </form>

      <!-- Registro -->
      <div class="card-footer">
        <span class="footer-text">¿No tienes cuenta?</span>
        <span class="footer-link" (click)="irARegistro()">Regístrate aquí</span>
      </div>

    </div>

  </div>

</ion-content>
