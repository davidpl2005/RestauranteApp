<ion-tabs>

  <ion-tab-bar slot="bottom">

    <ion-tab-button tab="menu">
      <ion-icon name="restaurant-outline"></ion-icon>
      <ion-label>Menú</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="carrito" class="tab-carrito-btn">
      <ion-icon name="cart-outline"></ion-icon>
      <ion-badge
        *ngIf="totalItemsCarrito > 0"
        class="carrito-badge">
        {{ totalItemsCarrito > 9 ? '9+' : totalItemsCarrito }}
      </ion-badge>
      <ion-label>Carrito</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="pedidos">
      <ion-icon name="receipt-outline"></ion-icon>
      <ion-label>Pedidos</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="perfil">
      <ion-icon name="person-outline"></ion-icon>
      <ion-label>Perfil</ion-label>
    </ion-tab-button>

  </ion-tab-bar>

</ion-tabs>
